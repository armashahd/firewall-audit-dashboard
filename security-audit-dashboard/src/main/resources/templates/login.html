<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<main class="page-main min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card dashboard-card" style="width: min(420px, 100%);">
        <div class="card-body p-4 p-lg-5">
            <div class="text-center mb-4">
                <img th:src="@{/images/ntg-logo.png}" alt="NTG logo" class="sidebar-logo mb-3">
                <h1 class="h4 mb-1">Firewall Audit</h1>
                <div class="text-muted">Sign in to continue</div>
            </div>
            <div th:if="${param.error}" class="alert alert-danger" role="alert">Invalid username or password.</div>
            <div th:if="${param.logout}" class="alert alert-success" role="alert">You have been logged out.</div>
            <form th:action="@{/login}" method="post" class="row g-3">
                <div class="col-12">
                    <label for="username" class="form-label">Username</label>
                    <input id="username" type="text" name="username" class="form-control" autofocus required>
                </div>
                <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <input id="password" type="password" name="password" class="form-control" required>
                </div>
                <div class="col-12 pt-2">
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
