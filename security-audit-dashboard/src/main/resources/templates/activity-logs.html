<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Activity Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: layout('settings', 'Activity Logs', 'Review security and workflow activity.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Activity Logs</h5>
                <div class="lead">Important user actions across reports, findings, exceptions, and users.</div>
            </div>
            <div class="toolbar-group">
                <a th:href="@{/activity-logs/export.csv}" class="btn btn-outline-success">Download CSV</a>
                <a th:href="@{/activity-logs/print}" class="btn btn-outline-primary" target="_blank">Print Logs</a>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Date/Time</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Action Type</th>
                            <th>Entity Type</th>
                            <th>Entity ID/Name</th>
                            <th>Old Value</th>
                            <th>New Value</th>
                            <th>Comment</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(logs)}">
                            <td colspan="9" class="text-center py-5 text-muted">No activity logs found.</td>
                        </tr>
                        <tr th:each="log : ${logs}">
                            <td class="text-nowrap" th:text="${log.createdAt != null ? #temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                            <td th:text="${log.username != null ? log.username : '-'}"></td>
                            <td th:text="${log.role != null ? log.role : '-'}"></td>
                            <td th:text="${log.actionType != null ? log.actionType : '-'}"></td>
                            <td th:text="${log.entityType != null ? log.entityType : '-'}"></td>
                            <td th:text="${(log.entityId != null ? log.entityId : '-') + (log.entityName != null ? ' / ' + log.entityName : '')}"></td>
                            <td style="white-space:pre-wrap;" th:text="${log.oldValue != null ? log.oldValue : '-'}"></td>
                            <td style="white-space:pre-wrap;" th:text="${log.newValue != null ? log.newValue : '-'}"></td>
                            <td style="white-space:pre-wrap;" th:text="${log.comment != null ? log.comment : '-'}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
