<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${formTitle}">Site Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('sites', ${formTitle}, 'Create or update a firewall site record.', ~{::content})}">
    <section th:fragment="content">
        <div class="card dashboard-card">
            <div class="card-body p-4 p-lg-5">
                <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

                <form th:action="@{/sites}" th:object="${site}" method="post" class="row g-3">
                    <input type="hidden" th:field="*{id}">

                    <div class="col-md-6">
                        <label class="form-label">Site Name</label>
                        <input type="text" class="form-control" th:field="*{name}" th:classappend="${nameError} ? ' is-invalid' : ''" placeholder="North Data Center">
                        <div class="invalid-feedback d-block" th:if="${nameError}" th:text="${nameError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control" th:field="*{country}" th:classappend="${countryError} ? ' is-invalid' : ''" placeholder="Sri Lanka">
                        <div class="invalid-feedback d-block" th:if="${countryError}" th:text="${countryError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">City</label>
                        <input type="text" class="form-control" th:field="*{city}" th:classappend="${cityError} ? ' is-invalid' : ''" placeholder="Colombo">
                        <div class="invalid-feedback d-block" th:if="${cityError}" th:text="${cityError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Firewall Vendor</label>
                        <input type="text" class="form-control" th:field="*{firewallVendor}" th:classappend="${firewallVendorError} ? ' is-invalid' : ''" placeholder="Fortinet">
                        <div class="invalid-feedback d-block" th:if="${firewallVendorError}" th:text="${firewallVendorError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Firewall Model</label>
                        <input type="text" class="form-control" th:field="*{firewallModel}" th:classappend="${firewallModelError} ? ' is-invalid' : ''" placeholder="FortiGate 100F">
                        <div class="invalid-feedback d-block" th:if="${firewallModelError}" th:text="${firewallModelError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Firmware Version</label>
                        <input type="text" class="form-control" th:field="*{firmwareVersion}" th:classappend="${firmwareVersionError} ? ' is-invalid' : ''" placeholder="7.4.8">
                        <div class="invalid-feedback d-block" th:if="${firmwareVersionError}" th:text="${firmwareVersionError}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Security Score</label>
                        <input type="number" min="0" max="100" class="form-control" th:field="*{securityScore}" th:classappend="${securityScoreError} ? ' is-invalid' : ''" placeholder="92">
                        <div class="invalid-feedback d-block" th:if="${securityScoreError}" th:text="${securityScoreError}"></div>
                    </div>
                    <div class="col-md-6" th:if="*{id != null}">
                        <label class="form-label">Current Status</label>
                        <div class="form-control bg-body-tertiary d-flex align-items-center">
                            <span th:switch="*{status != null ? status.name() : ''}">
                                <span th:case="'ACTIVE'" class="badge bg-success">ACTIVE</span>
                                <span th:case="'UNDER_AUDIT'" class="badge bg-warning text-dark">UNDER AUDIT</span>
                                <span th:case="'INACTIVE'" class="badge bg-secondary">INACTIVE</span>
                                <span th:case="*" class="badge bg-light text-dark border">N/A</span>
                            </span>
                        </div>
                    </div>
                    <div class="col-12" th:if="*{id != null}">
                        <label class="form-label">Last Audit Date</label>
                        <div class="form-control bg-body-tertiary" th:text="*{lastAuditDate != null ? #temporals.format(lastAuditDate, 'yyyy-MM-dd') : 'Not recorded'}"></div>
                    </div>

                    <div class="col-12 d-flex flex-wrap gap-2 pt-2">
                        <button type="submit" class="btn btn-primary" th:text="${submitLabel}">Save Site</button>
                        <a th:href="@{/sites}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</div>
</body>
</html>
