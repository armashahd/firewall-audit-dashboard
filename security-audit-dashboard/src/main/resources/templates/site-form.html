<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${formTitle}">Site Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 th:text="${formTitle}">Site Form</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/sites}" th:object="${site}" method="post">

                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Site Name</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Country</label>
                    <input type="text" class="form-control" th:field="*{country}">
                </div>

                <div class="mb-3">
                    <label class="form-label">City</label>
                    <input type="text" class="form-control" th:field="*{city}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Firewall Vendor</label>
                    <input type="text" class="form-control" th:field="*{firewallVendor}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Firewall Model</label>
                    <input type="text" class="form-control" th:field="*{firewallModel}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Firmware Version</label>
                    <input type="text" class="form-control" th:field="*{firmwareVersion}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Security Score</label>
                    <input type="number" class="form-control" th:field="*{securityScore}">
                </div>

                <button type="submit" class="btn btn-success">
                    <span th:text="${submitLabel}">Save Site</span>
                </button>

                <a th:href="@{/sites}" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
