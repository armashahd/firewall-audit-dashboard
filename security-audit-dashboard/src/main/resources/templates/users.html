<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: layout('settings', 'User Management', 'Manage dashboard users, roles, and passwords.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Users</h5>
                <div class="lead">Accounts with role-based access to this dashboard.</div>
            </div>
            <div class="toolbar-group">
                <a th:href="@{/users/new}" class="btn btn-primary">Add User</a>
            </div>
        </div>
        <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Username</th>
                            <th>Display Name</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th class="text-nowrap">Password Reset</th>
                            <th class="text-nowrap">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(users)}">
                            <td colspan="6" class="text-center py-5 text-muted">No users found.</td>
                        </tr>
                        <tr th:each="user : ${users}">
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.displayName}"></td>
                            <td><span class="badge bg-secondary" th:text="${user.role}"></span></td>
                            <td>
                                <span th:if="${user.enabled}" class="badge bg-success">Enabled</span>
                                <span th:unless="${user.enabled}" class="badge bg-secondary">Disabled</span>
                            </td>
                            <td>
                                <form th:action="@{/users/{id}/password(id=${user.id})}" method="post" class="d-flex gap-2">
                                    <input type="password" name="rawPassword" class="form-control form-control-sm" placeholder="New password" required>
                                    <button type="submit" class="btn btn-sm btn-outline-primary">Reset</button>
                                </form>
                            </td>
                            <td class="text-nowrap">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-outline-primary">Edit</a>
                                    <form th:if="${user.enabled}" th:action="@{/users/{id}/disable(id=${user.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-secondary">Disable</button>
                                    </form>
                                    <form th:unless="${user.enabled}" th:action="@{/users/{id}/enable(id=${user.id})}" method="post" class="d-inline">
                                        <button type="submit" class="btn btn-outline-success">Enable</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
