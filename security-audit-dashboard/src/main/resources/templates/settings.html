<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('settings', 'Settings', 'Application configuration placeholder for version 1.', ~{::content})}">

        <div class="card dashboard-card">
            <div class="card-body p-4 p-lg-5">
                <h5 class="mb-3">Settings</h5>
                <p class="text-muted mb-0">Version 1 keeps settings read-only. This page is reserved for future administrative configuration.</p>
            </div>
        </div>
    </section>
</div>

</html>
