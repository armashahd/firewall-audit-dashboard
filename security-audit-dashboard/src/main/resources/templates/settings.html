<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Firewall Security Audit Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 bg-dark text-white vh-100 p-3">

            <h4 class="mb-4">Audit Dashboard</h4>

            <div class="list-group">

                <a th:href="@{/}" class="list-group-item list-group-item-action active">
                    Dashboard
                </a>

                <a th:href="@{/sites}" class="list-group-item list-group-item-action">
                    Sites
                </a>

                <a th:href="@{/findings}" class="list-group-item list-group-item-action">
                    Findings
                </a>

                <a th:href="@{/reports}" class="list-group-item list-group-item-action">
                    Reports
                </a>

                <a th:href="@{/settings}" class="list-group-item list-group-item-action">
                    Settings
                </a>

            </div>

        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-4 bg-light">

            <h2 class="mb-4">Firewall Security Audit Dashboard</h2>

            <div class="row g-4">

                <div class="col-md-3">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h6>Overall Score</h6>
                            <h2>92%</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h6>Open Findings</h6>
                            <h2>15</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h6>Closed Findings</h6>
                            <h2>48</h2>
                        </div>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card text-center shadow-sm">
                        <div class="card-body">
                            <h6>Completion</h6>
                            <h2>76%</h2>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
