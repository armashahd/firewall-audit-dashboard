<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload Audit Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('reports', 'Upload Audit Report', 'Import a firewall audit PDF and generate audit records automatically.', ~{::content})}">
    <section th:fragment="content">
        <div class="card dashboard-card">
            <div class="card-body p-4 p-lg-5">
                <div th:if="${uploadError}" class="alert alert-danger" role="alert" th:text="${uploadError}"></div>
                <form th:action="@{/reports/upload}" method="post" enctype="multipart/form-data" class="row g-3" id="reportUploadForm">
                    <div class="col-12">
                        <label class="form-label">Firewall Audit PDF</label>
                        <input type="file" class="form-control" name="file" accept="application/pdf,.pdf" required>
                    </div>
                    <div class="col-12">
                        <div class="alert alert-info mb-0">
                            The importer will extract report metadata, create the site and audit, import vulnerability/compliance findings, and link this PDF to the report record.
                        </div>
                    </div>
                    <div class="col-12 d-flex flex-wrap gap-2 pt-2">
                        <button type="submit" class="btn btn-primary">Upload and Import</button>
                        <a th:href="@{/reports}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                    <div class="col-12 d-none" id="uploadProgress">
                        <div class="stat-label mb-2">Processing audit report</div>
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width:100%"></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
</div>
<script>
    document.getElementById('reportUploadForm').addEventListener('submit', function () {
        document.getElementById('uploadProgress').classList.remove('d-none');
    });
</script>
</body>
</html>
