<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Findings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('findings', 'Findings', 'Manage and track security findings across audits.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Finding Register</h5>
                <div class="lead">Risk items are linked to an audit and managed through closure.</div>
            </div>
            <div class="toolbar-group" th:if="${canManageAll}">
                <a th:href="@{/findings/new}" class="btn btn-primary">Add Finding</a>
            </div>
        </div>
        <div th:if="${successMessage}" class="alert alert-success" role="alert" th:text="${successMessage}"></div>
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}"></div>

        <div class="card dashboard-card">
            <div class="card-body">
                <form th:action="@{/findings}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3 col-lg-2">
                        <label for="siteId" class="form-label small text-muted">Site</label>
                        <select id="siteId" name="siteId" class="form-select">
                            <option value="">All Sites</option>
                            <option th:each="site : ${sites}"
                                    th:value="${site.id}"
                                    th:selected="${selectedSiteId != null and selectedSiteId == site.id}"
                                    th:text="${site.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="severity" class="form-label small text-muted">Severity</label>
                        <select id="severity" name="severity" class="form-select">
                            <option value="">All Severities</option>
                            <option th:each="severityOption : ${severities}"
                                    th:value="${severityOption.name()}"
                                    th:selected="${selectedSeverity != null and selectedSeverity == severityOption}"
                                    th:text="${severityOption.name()}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="status" class="form-label small text-muted">Status</label>
                        <select id="status" name="status" class="form-select">
                            <option value="">All Statuses</option>
                            <option th:each="statusOption : ${statuses}"
                                    th:value="${statusOption.name()}"
                                    th:selected="${selectedStatus != null and selectedStatus == statusOption}"
                                    th:text="${statusOption.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="category" class="form-label small text-muted">Category</label>
                        <select id="category" name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="categoryOption : ${categories}"
                                    th:value="${categoryOption}"
                                    th:selected="${selectedCategory != null and selectedCategory == categoryOption}"
                                    th:text="${categoryOption}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="overdue" class="form-label small text-muted">Due Status</label>
                        <select id="overdue" name="overdue" class="form-select">
                            <option value="">All Findings</option>
                            <option value="true" th:selected="${selectedOverdue}">Overdue Only</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">Filter</button>
                            <a th:href="@{/findings}" class="btn btn-outline-secondary">Reset</a>
                        </div>
                    </div>
                    <div class="col-12">
                        <span class="text-muted small" th:text="${#lists.size(findings)} + ' finding(s) shown'"></span>
                    </div>
                </form>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Finding No.</th>
                            <th>Title</th>
                            <th>Audit</th>
                            <th>Severity</th>
                            <th>Status</th>
                            <th>Category</th>
                            <th>Assigned To</th>
                            <th>Due Date</th>
                            <th class="text-nowrap">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(findings)}">
                            <td colspan="9" class="text-center py-5 text-muted">No findings found.</td>
                        </tr>
                        <tr th:each="finding : ${findings}">
                            <td><a th:href="@{/findings/details/{id}(id=${finding.id})}" class="fw-semibold text-decoration-none" th:text="${finding.referenceNumber}"></a></td>
                            <td><a th:href="@{/findings/details/{id}(id=${finding.id})}" class="fw-semibold text-decoration-none" th:text="${finding.title}"></a></td>
                            <td th:text="${finding.audit != null ? (finding.audit.site != null ? finding.audit.site.name + ' / ' + finding.audit.referenceNumber : finding.audit.referenceNumber) : '-'}"></td>
                            <td>
                                <span th:switch="${finding.severity != null ? finding.severity.name() : ''}">
                                    <span th:case="'CRITICAL'" class="badge bg-danger">Critical</span>
                                    <span th:case="'HIGH'" class="badge bg-warning text-dark">High</span>
                                    <span th:case="'MEDIUM'" class="badge bg-info text-dark">Medium</span>
                                    <span th:case="'LOW'" class="badge bg-success">Low</span>
                                    <span th:case="*" class="badge bg-light text-dark border">N/A</span>
                                </span>
                            </td>
                            <td>
                                <form th:action="@{/findings/{id}/status(id=${finding.id})}" method="post" class="finding-status-form">
                                    <input type="hidden" name="comment" class="finding-status-comment">
                                    <select name="status"
                                            class="form-select form-select-sm finding-status-select"
                                            th:data-current-status="${finding.status != null ? finding.status.name() : ''}"
                                            th:data-finding-title="${finding.title}">
                                        <option th:each="statusOption : ${statuses}"
                                                th:value="${statusOption.name()}"
                                                th:selected="${finding.status == statusOption}"
                                                th:text="${statusOption.displayName}"></option>
                                    </select>
                                </form>
                            </td>
                            <td th:text="${finding.category != null ? finding.category : '-'}"></td>
                            <td th:text="${finding.assignedTo != null ? finding.assignedTo : '-'}"></td>
                            <td th:text="${finding.dueDate != null ? #temporals.format(finding.dueDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td class="text-nowrap">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/findings/details/{id}(id=${finding.id})}" class="btn btn-outline-secondary">View</a>
                                    <a th:if="${canManageAll}" th:href="@{/findings/edit/{id}(id=${finding.id})}" class="btn btn-outline-primary">Edit</a>
                                    <form th:if="${canManageAll}" th:action="@{/findings/{id}/delete(id=${finding.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this finding permanently?');">
                                        <button type="submit" class="btn btn-outline-danger">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="modal fade" id="findingStatusCommentModal" tabindex="-1" aria-labelledby="findingStatusCommentModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="findingStatusCommentModalLabel">Workflow Comment</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p class="text-muted mb-3" id="findingStatusCommentHelp"></p>
                        <label for="findingStatusCommentText" class="form-label" id="findingStatusCommentLabel">Comment</label>
                        <textarea id="findingStatusCommentText" class="form-control" rows="4" required></textarea>
                        <div class="invalid-feedback">A comment is required for this status.</div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-primary" id="findingStatusCommentSave">Save Status</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const modalElement = document.getElementById('findingStatusCommentModal');
        const modal = new bootstrap.Modal(modalElement);
        const modalTitle = document.getElementById('findingStatusCommentModalLabel');
        const modalHelp = document.getElementById('findingStatusCommentHelp');
        const modalLabel = document.getElementById('findingStatusCommentLabel');
        const modalText = document.getElementById('findingStatusCommentText');
        const modalSave = document.getElementById('findingStatusCommentSave');
        let pendingForm = null;
        let pendingSelect = null;

        document.querySelectorAll('.finding-status-select').forEach(function (select) {
            select.addEventListener('change', function () {
                const selectedStatus = select.value;
                const currentStatus = select.dataset.currentStatus;
                const findingTitle = select.dataset.findingTitle || 'this finding';

                if (selectedStatus === currentStatus) {
                    return;
                }

                if (selectedStatus === 'CLOSED' || selectedStatus === 'ACCEPTED_RISK') {
                    pendingForm = select.closest('form');
                    pendingSelect = select;
                    modalText.value = '';
                    modalText.classList.remove('is-invalid');

                    if (selectedStatus === 'CLOSED') {
                        modalTitle.textContent = 'Close Finding';
                        modalLabel.textContent = 'Resolution comment';
                        modalHelp.textContent = 'Add the resolution comment for "' + findingTitle + '".';
                    } else {
                        modalTitle.textContent = 'Accept Risk';
                        modalLabel.textContent = 'Risk acceptance justification';
                        modalHelp.textContent = 'Add the risk acceptance justification for "' + findingTitle + '".';
                    }

                    modal.show();
                } else {
                    select.closest('form').submit();
                }
            });
        });

        modalSave.addEventListener('click', function () {
            const comment = modalText.value.trim();
            if (!comment) {
                modalText.classList.add('is-invalid');
                modalText.focus();
                return;
            }

            pendingForm.querySelector('.finding-status-comment').value = comment;
            pendingForm.submit();
        });

        modalElement.addEventListener('hidden.bs.modal', function () {
            if (pendingSelect && pendingForm && !pendingForm.querySelector('.finding-status-comment').value) {
                pendingSelect.value = pendingSelect.dataset.currentStatus;
            }
            pendingForm = null;
            pendingSelect = null;
        });
    });
</script>
</body>
</html>
