<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Findings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('findings', 'Findings', 'Manage and track security findings across audits.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Finding Register</h5>
                <div class="lead">Risk items are linked to an audit and managed through closure.</div>
            </div>
            <div class="toolbar-group">
                <a th:href="@{/findings/new}" class="btn btn-primary">Add Finding</a>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body">
                <form th:action="@{/findings}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-3 col-lg-2">
                        <label for="siteId" class="form-label small text-muted">Site</label>
                        <select id="siteId" name="siteId" class="form-select">
                            <option value="">All Sites</option>
                            <option th:each="site : ${sites}"
                                    th:value="${site.id}"
                                    th:selected="${selectedSiteId != null and selectedSiteId == site.id}"
                                    th:text="${site.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="severity" class="form-label small text-muted">Severity</label>
                        <select id="severity" name="severity" class="form-select">
                            <option value="">All Severities</option>
                            <option th:each="severityOption : ${severities}"
                                    th:value="${severityOption.name()}"
                                    th:selected="${selectedSeverity != null and selectedSeverity == severityOption}"
                                    th:text="${severityOption.name()}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="status" class="form-label small text-muted">Status</label>
                        <select id="status" name="status" class="form-select">
                            <option value="">All Statuses</option>
                            <option th:each="statusOption : ${statuses}"
                                    th:value="${statusOption.name()}"
                                    th:selected="${selectedStatus != null and selectedStatus == statusOption}"
                                    th:text="${statusOption.displayName}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="category" class="form-label small text-muted">Category</label>
                        <select id="category" name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="categoryOption : ${categories}"
                                    th:value="${categoryOption}"
                                    th:selected="${selectedCategory != null and selectedCategory == categoryOption}"
                                    th:text="${categoryOption}"></option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <label for="overdue" class="form-label small text-muted">Due Status</label>
                        <select id="overdue" name="overdue" class="form-select">
                            <option value="">All Findings</option>
                            <option value="true" th:selected="${selectedOverdue}">Overdue Only</option>
                        </select>
                    </div>
                    <div class="col-md-3 col-lg-2">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">Filter</button>
                            <a th:href="@{/findings}" class="btn btn-outline-secondary">Reset</a>
                        </div>
                    </div>
                    <div class="col-12">
                        <span class="text-muted small" th:text="${#lists.size(findings)} + ' finding(s) shown'"></span>
                    </div>
                </form>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Title</th>
                            <th>Audit</th>
                            <th>Severity</th>
                            <th>Status</th>
                            <th>Category</th>
                            <th>Assigned To</th>
                            <th>Due Date</th>
                            <th class="text-nowrap">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(findings)}">
                            <td colspan="8" class="text-center py-5 text-muted">No findings found.</td>
                        </tr>
                        <tr th:each="finding : ${findings}">
                            <td><a th:href="@{/findings/details/{id}(id=${finding.id})}" class="fw-semibold text-decoration-none" th:text="${finding.title}"></a></td>
                            <td th:text="${finding.audit != null ? (finding.audit.site != null ? finding.audit.site.name + ' / #' + finding.audit.id : '#' + finding.audit.id) : '-'}"></td>
                            <td>
                                <span th:switch="${finding.severity != null ? finding.severity.name() : ''}">
                                    <span th:case="'CRITICAL'" class="badge bg-danger">Critical</span>
                                    <span th:case="'HIGH'" class="badge bg-warning text-dark">High</span>
                                    <span th:case="'MEDIUM'" class="badge bg-info text-dark">Medium</span>
                                    <span th:case="'LOW'" class="badge bg-success">Low</span>
                                    <span th:case="*" class="badge bg-light text-dark border">N/A</span>
                                </span>
                            </td>
                            <td>
                                <span th:switch="${finding.status != null ? finding.status.name() : ''}">
                                    <span th:case="'OPEN'" class="badge bg-danger">Open</span>
                                    <span th:case="'IN_PROGRESS'" class="badge bg-warning text-dark">In Progress</span>
                                    <span th:case="'CLOSED'" class="badge bg-success">Closed</span>
                                    <span th:case="'ACCEPTED_RISK'" class="badge bg-secondary">Accepted Risk</span>
                                    <span th:case="*" class="badge bg-light text-dark border">N/A</span>
                                </span>
                            </td>
                            <td th:text="${finding.category != null ? finding.category : '-'}"></td>
                            <td th:text="${finding.assignedTo != null ? finding.assignedTo : '-'}"></td>
                            <td th:text="${finding.dueDate != null ? #temporals.format(finding.dueDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td class="text-nowrap">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/findings/details/{id}(id=${finding.id})}" class="btn btn-outline-secondary">View</a>
                                    <a th:href="@{/findings/edit/{id}(id=${finding.id})}" class="btn btn-outline-primary">Edit</a>
                                    <form th:action="@{/findings/{id}/delete(id=${finding.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this finding permanently?');">
                                        <button type="submit" class="btn btn-outline-danger">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
