<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Firewall Security Audit Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->
        <div class="col-lg-2 sidebar">

            <h3>NTG</h3>

            <a th:href="@{/}" class="active">
                🏠 Dashboard
            </a>

            <a th:href="@{/sites}">
                🌍 Sites
            </a>

            <a th:href="@{/findings}">
                🛡 Findings
            </a>

            <a th:href="@{/reports}">
                📄 Reports
            </a>

            <a th:href="@{/settings}">
                ⚙ Settings
            </a>

        </div>

        <!-- Main Content -->
        <div class="col-lg-10 p-4">

            <!-- Top Bar -->

            <div class="topbar d-flex justify-content-between align-items-center">

                <div>

                    <h2 class="mb-0">
                        Firewall Security Audit Dashboard
                    </h2>

                    <small class="text-muted">
                        North Technology Group
                    </small>

                </div>

                <div>

                    <span class="badge bg-primary p-3">
                        Administrator
                    </span>

                </div>

            </div>

            <!-- KPI Cards -->

            <div class="row g-4">

                <div class="col-lg-3">

                    <div class="card dashboard-card">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Overall Security Score
                            </h6>

                            <h2 class="text-primary" th:text="${dashboard.overallSecurityScore + '%'}">
                                92%
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3">

                    <div class="card dashboard-card">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Open Findings
                            </h6>

                            <h2 class="text-danger" th:text="${dashboard.openFindings}">
                                15
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3">

                    <div class="card dashboard-card">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Closed Findings
                            </h6>

                            <h2 class="text-success" th:text="${dashboard.closedFindings}">
                                48
                            </h2>

                        </div>

                    </div>

                </div>

                <div class="col-lg-3">

                    <div class="card dashboard-card">

                        <div class="card-body">

                            <h6 class="text-muted">
                                Completion
                            </h6>

                            <h2 class="text-warning" th:text="${dashboard.completionPercentage + '%'}">
                                76%
                            </h2>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Placeholder -->

            <div class="card dashboard-card mt-4">

                <div class="card-body">

                    <h4>
                        Security Trend
                    </h4>

                    <p class="text-muted">
                        Chart.js graphs will be added here.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
