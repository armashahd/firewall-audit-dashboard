<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('reports', 'Reports', 'Document and metadata records for completed audits.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Report Library</h5>
                <div class="lead">Metadata records only, no file upload required.</div>
            </div>
            <div class="toolbar-group">
                <a th:href="@{/reports/new}" class="btn btn-primary">Add Report</a>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>File Name</th>
                            <th>File Path</th>
                            <th>Version</th>
                            <th>Upload Date</th>
                            <th>Uploaded By</th>
                            <th class="text-nowrap">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(reports)}">
                            <td colspan="6" class="text-center py-5 text-muted">No reports found.</td>
                        </tr>
                        <tr th:each="report : ${reports}">
                            <td><a th:href="@{/reports/details/{id}(id=${report.id})}" class="fw-semibold text-decoration-none" th:text="${report.fileName}"></a></td>
                            <td th:text="${report.filePath != null ? report.filePath : '-'}"></td>
                            <td th:text="${report.version != null ? report.version : '-'}"></td>
                            <td th:text="${report.uploadDate != null ? #temporals.format(report.uploadDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td th:text="${report.uploadedBy != null ? report.uploadedBy : '-'}"></td>
                            <td class="text-nowrap">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/reports/details/{id}(id=${report.id})}" class="btn btn-outline-secondary">View</a>
                                    <a th:href="@{/reports/edit/{id}(id=${report.id})}" class="btn btn-outline-primary">Edit</a>
                                    <form th:action="@{/reports/{id}/delete(id=${report.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this report permanently?');">
                                        <button type="submit" class="btn btn-outline-danger">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
