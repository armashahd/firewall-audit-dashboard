<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Audits</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('audits', 'Audits', 'Track audit rounds and outcomes by site.', ~{::content})}">
    <section th:fragment="content" class="content-grid">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Audit Register</h5>
                <div class="lead">Every audit is tied to a site and tracked through its lifecycle.</div>
            </div>
            <div class="toolbar-group" th:if="${canManageAll}">
                <a th:href="@{/audits/new}" class="btn btn-primary">Add Audit</a>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body">
                <form th:action="@{/audits}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4 col-lg-3">
                        <label for="siteId" class="form-label small text-muted">Site Name</label>
                        <select id="siteId" name="siteId" class="form-select">
                            <option value="">All Sites</option>
                            <option th:each="site : ${sites}"
                                    th:value="${site.id}"
                                    th:selected="${selectedSiteId != null and selectedSiteId == site.id}"
                                    th:text="${site.name}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 col-lg-2">
                        <label for="auditRound" class="form-label small text-muted">Audit Round</label>
                        <select id="auditRound" name="auditRound" class="form-select">
                            <option value="">All Rounds</option>
                            <option th:each="round : ${auditRounds}"
                                    th:value="${round}"
                                    th:selected="${selectedAuditRound != null and selectedAuditRound == round}"
                                    th:text="${'Round ' + round}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 col-lg-2">
                        <label for="year" class="form-label small text-muted">Year</label>
                        <select id="year" name="year" class="form-select">
                            <option value="">All Years</option>
                            <option th:each="yearOption : ${years}"
                                    th:value="${yearOption}"
                                    th:selected="${selectedYear != null and selectedYear == yearOption}"
                                    th:text="${yearOption}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 col-lg-2">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">Filter</button>
                            <a th:href="@{/audits}" class="btn btn-outline-secondary">Reset</a>
                        </div>
                    </div>
                    <div class="col-12">
                        <span class="text-muted small" th:text="${#lists.size(audits)} + ' audit(s) shown'"></span>
                    </div>
                </form>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Audit No.</th>
                            <th>Site Name</th>
                            <th>Audit Round</th>
                            <th>Audit Date</th>
                            <th>Auditor</th>
                            <th>Overall Score</th>
                            <th>Completion %</th>
                            <th class="text-nowrap">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(audits)}">
                            <td colspan="8" class="text-center py-5 text-muted">No audits found.</td>
                        </tr>
                        <tr th:each="audit : ${audits}">
                            <td><a th:href="@{/audits/details/{id}(id=${audit.id})}" class="fw-semibold text-decoration-none" th:text="${audit.referenceNumber}"></a></td>
                            <td>
                                <a th:href="@{/audits/details/{id}(id=${audit.id})}" class="fw-semibold text-decoration-none" th:text="${audit.site != null ? audit.site.name : '-'}"></a>
                            </td>
                            <td th:text="${audit.auditRound != null ? audit.auditRound : '-'}"></td>
                            <td th:text="${audit.auditDate != null ? #temporals.format(audit.auditDate, 'yyyy-MM-dd') : '-'}"></td>
                            <td th:text="${audit.auditor != null ? audit.auditor : '-'}"></td>
                            <td><span class="badge bg-secondary" th:text="${audit.overallScore != null ? audit.overallScore + '%' : 'N/A'}"></span></td>
                            <td><span class="badge bg-info text-dark" th:text="${audit.completionPercentage != null ? audit.completionPercentage + '%' : 'N/A'}"></span></td>
                            <td class="text-nowrap">
                                <div class="btn-group btn-group-sm">
                                    <a th:href="@{/audits/details/{id}(id=${audit.id})}" class="btn btn-outline-secondary">View</a>
                                    <a th:if="${canManageAll}" th:href="@{/audits/edit/{id}(id=${audit.id})}" class="btn btn-outline-primary">Edit</a>
                                    <form th:if="${canManageAll}" th:action="@{/audits/{id}/delete(id=${audit.id})}" method="post" class="d-inline" onsubmit="return confirm('Delete this audit permanently?');">
                                        <button type="submit" class="btn btn-outline-danger">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
