<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${report.fileName}">Report Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: layout('reports', ${report.fileName}, 'Report metadata and audit linkage.', ~{::content})}">
    <section th:fragment="content">
        <div class="page-actions">
            <div>
                <h5 class="mb-1">Report Details</h5>
                <div class="lead">Metadata only record for the audit report.</div>
            </div>
            <div class="toolbar-group">
                <a th:href="@{/reports}" class="btn btn-outline-secondary">Back</a>
                <a th:href="@{/reports/edit/{id}(id=${report.id})}" class="btn btn-outline-primary">Edit</a>
                <form th:action="@{/reports/{id}/delete(id=${report.id})}" method="post" onsubmit="return confirm('Delete this report permanently?');">
                    <button type="submit" class="btn btn-outline-danger">Delete</button>
                </form>
            </div>
        </div>

        <div class="card dashboard-card">
            <div class="card-body p-4 p-lg-5">
                <div class="row g-4">
                    <div class="col-md-6"><div class="stat-label">Audit</div><div class="fw-semibold fs-5" th:text="${report.audit != null ? (report.audit.site != null ? report.audit.site.name + ' / #' + report.audit.id : '#' + report.audit.id) : '-'}"></div></div>
                    <div class="col-md-6"><div class="stat-label">File Name</div><div class="fw-semibold fs-5" th:text="${report.fileName != null ? report.fileName : '-'}"></div></div>
                    <div class="col-md-6"><div class="stat-label">File Path</div><div class="fw-semibold fs-5" th:text="${report.filePath != null ? report.filePath : '-'}"></div></div>
                    <div class="col-md-6"><div class="stat-label">Version</div><div class="fw-semibold fs-5" th:text="${report.version != null ? report.version : '-'}"></div></div>
                    <div class="col-md-6"><div class="stat-label">Upload Date</div><div class="fw-semibold fs-5" th:text="${report.uploadDate != null ? #temporals.format(report.uploadDate, 'yyyy-MM-dd') : '-'}"></div></div>
                    <div class="col-md-6"><div class="stat-label">Uploaded By</div><div class="fw-semibold fs-5" th:text="${report.uploadedBy != null ? report.uploadedBy : '-'}"></div></div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
