spring.application.name=security-audit-dashboard
server.port=8080

# SQLite Database
spring.datasource.url=jdbc:sqlite:database/audit.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# Keep production/demo data empty unless explicitly enabled.
app.demo-data.enabled=false

# Uploaded firewall audit PDFs can be larger than Spring Boot's 1 MB default.
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
